              <img src="images/home/dessin-gravure/estampe-1.jpg" alt="estampe-1 – estampe-1" />
            <figcaption class="legend"><strong>Bois quadrillé n°1</strong>, 2025, encre sur papier, 32x28cm (matrice)</figcaption>
            <div class="detail-text"><p>Ces estampes sont le résultat d’une recherche en cours autour de la grille, élément essentiel dans mon travail étant donné que mes protocoles se basent sur des numéros convertis en coordonnées x/y. Pour cette gravure et d’autres à venir, je réalise une grille à l’aide d’un cutter, puis la forme à graver avec le même procédé. Il ne me reste plus qu’à retirer la matière à l’aide d’une gouge, en contrôlant autant que possible les accidents surgissants lorsque les « tuiles de bois sautent ».</p></div>
              <img src="images/home/dessin-gravure/estampe-2.jpg" alt="estampe-2 – estampe-2" />
            <figcaption class="legend"><strong>Bois quadrillé n°1</strong>, 2025, encre sur papier, 32x28cm (matrice)</figcaption>

            <figcaption class="legend">2025, dessin gaufrage, graphite et fusain sur papier, 8x7cm</figcaption>

              <img src="images/home/ludus/ludus-ensemble.jpg"/>
            <figcaption class="legend"><strong>Ludus Formethodicus</strong>, 2023, vue d'ensemble</figcaption>
            <div class="detail-text"><p>Ludus Formethodicus est le principal projet réalisé en 2023. Celui-ci est une synthèse de mon travail plastique présentant l’évolution de ma démarche et les techniques utilisées. Ce projet est composé de cinq séries de trois estampes, réalisées à l’aide de cinq dés différents, donc de cinq bases de données numériques différentes. Il comporte aussi un Livre des jeux, ouvrage documentant le processus.</p></div>
              <img src="images/home/ludus/ludus-estampe-1.jpg"/>
            <figcaption class="legend"><strong>Ludus Formethodicus</strong>, 2023, estampe, encre sur papier, 120x80cm</figcaption>
              <img src="images/home/ludus/ludus-estampe-2.jpg"/>
            <figcaption class="legend"><strong>Ludus Formethodicus</strong>, 2023, estampe, encre sur papier, 120x80cm</figcaption>
              <img src="images/home/ludus/ludus-estampe-3.jpg"/>
            <figcaption class="legend"><strong>Ludus Formethodicus</strong>, 2023, estampe, encre sur papier, 120x80cm</figcaption>
              <img src="images/home/ludus/ludus-table.jpg"/>
            <figcaption class="legend"><strong>Ludus Formethodicus</strong>, 2023, livre d'artiste et dés, dimensions variables</figcaption>
          </div>
          </div>
        </template>
